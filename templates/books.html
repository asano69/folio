{{define "title"}}Books - folio{{end}}

{{define "content"}}
<div class="books-container">
    <h2>Library</h2>
    {{if .Books}}
    <div class="books-grid">
        {{range .Books}}
        <div class="book-card">
            <a href="/viewer?book={{.ID}}">
                {{if .CoverFilename}}
                <div class="book-thumbnail">
                    <img src="/images/{{.ID}}/{{.CoverFilename}}" alt="{{.Title}} cover">
                </div>
                {{end}}
            </a>
            <div class="book-info">
                <h3 class="book-title" data-book-id="{{.ID}}">
                    <a href="/viewer?book={{.ID}}">{{.Title}}</a>
                </h3>
                <button class="rename-btn" data-book-id="{{.ID}}" title="Rename">✎</button>
            </div>
        </div>
        {{end}}
    </div>
    {{else}}
    <p class="no-books">No books found in library.</p>
    {{end}}
</div>
{{end}}
